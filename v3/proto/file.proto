syntax = "proto3";

package file;

option go_package = "services/file/pb";

service FileService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc CreateUpload(CreateUploadRequest) returns (CreateUploadResponse);
  rpc CompleteUpload(CompleteUploadRequest) returns (AssetResponse);
  rpc ListAssets(ListAssetsRequest) returns (ListAssetsResponse);
  rpc GetAsset(GetAssetRequest) returns (AssetResponse);
  rpc DeleteAsset(DeleteAssetRequest) returns (DeleteAssetResponse);
  rpc GetFileConfig(GetFileConfigRequest) returns (GetFileConfigResponse);
  rpc UpdateFileConfig(UpdateFileConfigRequest) returns (UpdateFileConfigResponse);
  rpc ListFileCategories(ListFileCategoriesRequest) returns (ListFileCategoriesResponse);
  rpc CreateFileCategory(CreateFileCategoryRequest) returns (FileCategoryResponse);
  rpc UpdateFileCategory(UpdateFileCategoryRequest) returns (FileCategoryResponse);
  rpc UpdateFileCategoryExtensions(UpdateFileCategoryExtensionsRequest) returns (FileCategoryResponse);
  rpc SetDefaultFileCategory(SetDefaultFileCategoryRequest) returns (FileCategoryResponse);
}

enum AssetVisibility {
  ASSET_VISIBILITY_UNSPECIFIED = 0;
  ASSET_VISIBILITY_PUBLIC = 1;
  ASSET_VISIBILITY_PRIVATE = 2;
}

enum AssetStatus {
  ASSET_STATUS_UNSPECIFIED = 0;
  ASSET_STATUS_PENDING = 1;
  ASSET_STATUS_UPLOADED = 2;
  ASSET_STATUS_DELETED = 3;
}

message PingRequest {}

message PingResponse {
  bool ok = 1;
  string service = 2;
}

message Asset {
  string asset_id = 1;
  string upload_id = 2;
  string owner_user_id = 3;
  string category_key = 4;
  AssetVisibility visibility = 5;
  AssetStatus status = 6;
  string bucket = 7;
  string object_key = 8;
  string public_url = 9;
  string file_name = 10;
  string content_type = 11;
  int64 byte_size = 12;
  int64 created_at = 13;
  int64 expires_at = 14;
  int64 uploaded_at = 15;
  int64 deleted_at = 16;
}

message CreateUploadRequest {
  string actor_user_id = 1;
  string category_key = 2;
  string file_name = 3;
  string content_type = 4;
  int64 byte_size = 5;
  AssetVisibility visibility = 6;
}

message CreateUploadResponse {
  Asset asset = 1;
  string upload_url = 2;
  map<string, string> headers = 3;
  int64 expires_at = 4;
  int64 max_bytes = 5;
}

message CompleteUploadRequest {
  string actor_user_id = 1;
  string upload_id = 2;
}

message ListAssetsRequest {
  string actor_user_id = 1;
  string category_key = 2;
  AssetStatus status = 3;
  AssetVisibility visibility = 4;
  string owner_user_id = 5;
  string keyword = 6;
  int32 page = 7;
  int32 page_size = 8;
}

message GetAssetRequest {
  string actor_user_id = 1;
  string asset_id = 2;
}

message AssetResponse {
  Asset asset = 1;
}

message ListAssetsResponse {
  repeated Asset items = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message DeleteAssetRequest {
  string actor_user_id = 1;
  string asset_id = 2;
}

message DeleteAssetResponse {
  bool ok = 1;
}

message FileConfig {
  int64 max_upload_bytes = 1;
  int32 presign_ttl_seconds = 2;
}

message GetFileConfigRequest {}

message GetFileConfigResponse {
  FileConfig config = 1;
}

message UpdateFileConfigRequest {
  int64 max_upload_bytes = 1;
  int32 presign_ttl_seconds = 2;
}

message UpdateFileConfigResponse {
  FileConfig config = 1;
}

message FileCategory {
  string category_key = 1;
  string display_name = 2;
  string description = 3;
  bool enabled = 4;
  bool is_default = 5;
  int32 sort_order = 6;
  repeated string allowed_extensions = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
}

message ListFileCategoriesRequest {
  bool include_disabled = 1;
}

message ListFileCategoriesResponse {
  repeated FileCategory items = 1;
}

message CreateFileCategoryRequest {
  string category_key = 1;
  string display_name = 2;
  string description = 3;
  bool enabled = 4;
  bool is_default = 5;
  int32 sort_order = 6;
  repeated string allowed_extensions = 7;
}

message UpdateFileCategoryRequest {
  string category_key = 1;
  string display_name = 2;
  string description = 3;
  bool enabled = 4;
  int32 sort_order = 5;
}

message UpdateFileCategoryExtensionsRequest {
  string category_key = 1;
  repeated string allowed_extensions = 2;
}

message SetDefaultFileCategoryRequest {
  string category_key = 1;
}

message FileCategoryResponse {
  FileCategory category = 1;
}
