basePath: /
consumes:
- application/json
info:
  contact:
    email: maintainers@beehive.local
    name: Beehive Blog Maintainers
    url: https://github.com/happyladysauce/Beehive-Blog-v3
  description: Beehive Blog v3 gateway HTTP contract for authentication, content management,
    public content reading, system probes, and websocket entrypoints. 适用于 Swagger
    UI、Apifox、Postman 等接口测试工具的联调与测试。
  license:
    name: Proprietary
    url: https://github.com/happyladysauce/Beehive-Blog-v3
  termsOfService: https://github.com/happyladysauce/Beehive-Blog-v3
  title: Beehive Blog v3 Gateway API
  version: v3
paths:
  /api/v3/auth/login:
    post:
      consumes:
      - application/json
      operationId: authAuthLogin
      parameters:
      - in: body
        name: body
        required: true
        schema:
          properties:
            client_type:
              enum:
              - web
              - ios
              - android
              example: web
              type: string
            device_id:
              example: device_web_chrome_001
              type: string
            device_name:
              example: Chrome on macOS
              type: string
            login_identifier:
              example: alice@example.com
              type: string
            password:
              example: Str0ngP@ssw0rd!
              type: string
            user_agent:
              example: Mozilla/5.0 (Macintosh; Intel Mac OS X 14_5) AppleWebKit/537.36
                Chrome/135.0.0.0 Safari/537.36
              type: string
          required:
          - login_identifier
          - password
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: ""
          schema:
            properties:
              access_token:
                example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.login_access
                type: string
              expires_in:
                example: 3600
                type: integer
              refresh_token:
                example: refresh_token_login_example
                type: string
              session:
                properties:
                  auth_source:
                    example: password
                    type: string
                  client_type:
                    enum:
                    - web
                    - ios
                    - android
                    example: web
                    type: string
                  device_id:
                    example: device_web_chrome_001
                    type: string
                  device_name:
                    example: Chrome on macOS
                    type: string
                  expires_at:
                    example: 1713776400
                    type: integer
                  last_seen_at:
                    example: 1713772800
                    type: integer
                  session_id:
                    example: sess_01J8SESSIONEXAMPLE
                    type: string
                  status:
                    example: active
                    type: string
                  user_id:
                    example: user_01J8PROFILEEXAMPLE
                    type: string
                required:
                - session_id
                - user_id
                - auth_source
                - status
                type: object
              session_id:
                example: sess_01J8LOGINEXAMPLE
                type: string
              token_type:
                example: Bearer
                type: string
              user:
                properties:
                  avatar_url:
                    example: https://cdn.example.com/avatar/alice.png
                    type: string
                  email:
                    example: alice@example.com
                    type: string
                  nickname:
                    example: Alice
                    type: string
                  role:
                    example: user
                    type: string
                  status:
                    example: active
                    type: string
                  user_id:
                    example: user_01J8PROFILEEXAMPLE
                    type: string
                  username:
                    example: beehive_user_01
                    type: string
                required:
                - user_id
                - username
                - email
                - role
                - status
                type: object
            type: object
      schemes:
      - https
      summary: AuthLogin
      tags:
      - Authentication
  /api/v3/auth/logout:
    post:
      consumes:
      - application/json
      operationId: authAuthLogout
      parameters:
      - example: Bearer eyJhbGciOi...
        in: header
        name: Authorization
        type: string
      - in: body
        name: body
        required: true
        schema:
          properties:
            refresh_token:
              example: refresh_token_login_example
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: ""
          schema:
            properties:
              ok:
                example: true
                type: boolean
            type: object
      schemes:
      - https
      security:
      - bearerAuth: []
      summary: AuthLogout
      tags:
      - Authentication
