Name: content.rpc
ListenOn: 0.0.0.0:8081
Etcd:
  Hosts:
  - 127.0.0.1:2379
  Key: content.rpc
Postgres:
  Host: 127.0.0.1
  Port: 5432
  User: Beehive-Blog-V3
  Password: Beehive-Blog-V3
  DBName: Beehive-Blog-V3
  SSLMode: disable
  TimeZone: Asia/Shanghai
  ConnectTimeoutSeconds: 5
  MaxOpenConns: 20
  MaxIdleConns: 10
  ConnMaxLifetimeSeconds: 1800
  ConnMaxIdleTimeSeconds: 600
RabbitMQ:
  URL: amqp://Beehive-Blog-V3:Beehive-Blog-V3@127.0.0.1:5672/
  Exchange: beehive.content.events
  ExchangeType: topic
  ConnectTimeoutSeconds: 5
Outbox:
  DispatchIntervalSeconds: 2
  BatchSize: 50
  MaxAttempts: 360
  RetryDelaySeconds: 10
  ProcessingTimeoutSeconds: 60
InternalAuthToken: change-me-in-local-env
AllowedCallers:
- gateway
