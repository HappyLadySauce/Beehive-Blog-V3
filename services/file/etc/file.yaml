Name: file.rpc
ListenOn: 0.0.0.0:8083
Mode: dev

Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: file.rpc

Postgres:
  Host: 127.0.0.1
  Port: 5432
  User: Beehive-Blog-V3
  Password: Beehive-Blog-V3
  DBName: Beehive-Blog-V3
  SSLMode: disable
  TimeZone: Asia/Shanghai
  ConnectTimeoutSeconds: 5
  MaxOpenConns: 20
  MaxIdleConns: 10
  ConnMaxLifetimeSeconds: 1800
  ConnMaxIdleTimeSeconds: 600
InternalAuthToken: "replace-me-with-a-shared-internal-secret"
AllowedCallers:
  - gateway

Storage:
  Driver: local
  PublicBaseURL: ""
  PresignTTLSeconds: 300
  Local:
    RootDir: "var/file/assets"
    TempDir: "var/file/pending"
    Bucket: "beehive-local"
  S3:
    Endpoint: "http://127.0.0.1:9000"
    Region: "us-east-1"
    Bucket: "beehive"
    AccessKeyID: ""
    SecretAccessKey: ""
  Namespaces:
    avatar:
      MaxBytes: 2097152
      AllowedContentTypes:
        - image/png
        - image/jpeg
        - image/webp
        - image/avif
      StoragePrefix: "avatars"
    content_cover:
      MaxBytes: 5242880
      AllowedContentTypes:
        - image/png
        - image/jpeg
        - image/webp
        - image/avif
      StoragePrefix: "content/covers"
    content_image:
      MaxBytes: 5242880
      AllowedContentTypes:
        - image/png
        - image/jpeg
        - image/webp
        - image/avif
      StoragePrefix: "content/images"
    attachment:
      MaxBytes: 20971520
      AllowedContentTypes:
        - image/png
        - image/jpeg
        - image/webp
        - image/avif
        - application/pdf
      StoragePrefix: "attachments"
    "*":
      MaxBytes: 5242880
      AllowedContentTypes:
        - image/png
        - image/jpeg
        - image/webp
        - image/avif
      StoragePrefix: "misc"
